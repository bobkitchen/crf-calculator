<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask Albert — CRF Calculator</title>
  <link rel="stylesheet" href="design-tokens.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── Shared Platform Header ── */
    header {
      background: var(--black);
      border-bottom: 4px solid var(--irc-yellow);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 60px;
    }
    .logo-container { display: flex; align-items: center; flex-shrink: 0; }
    .logo-container svg { height: 36px; width: auto; display: block; }
    .header-brand { display: flex; align-items: center; gap: 12px; flex-shrink: 0; text-decoration: none; }
    .header-title { font-size: 1rem; font-weight: 700; letter-spacing: -0.04em; color: var(--white); line-height: 1.2; }
    .header-subtitle { font-size: 0.6875rem; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; color: var(--irc-yellow); margin-top: 2px; }
    .header-nav { display: flex; align-items: center; gap: 4px; margin-left: auto; }
    .header-nav a { padding: 8px 14px; border-radius: 6px; font-size: 0.8125rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--mid-gray); text-decoration: none; transition: all 0.12s ease; }
    .header-nav a:hover { color: var(--white); background: var(--dark-gray); }
    .header-nav a.active { color: var(--black); background: var(--irc-yellow); border-radius: 6px; }
    .header-nav a.ask-albert-btn { display: flex; align-items: center; gap: 6px; color: var(--irc-yellow); background: transparent; border: 1.5px solid var(--irc-yellow); margin-left: 8px; }
    .header-nav a.ask-albert-btn:hover { background: var(--irc-yellow); color: var(--black); }
    .header-nav a.ask-albert-btn.active { background: var(--irc-yellow); color: var(--black); }
    .header-nav a.ask-albert-btn svg { flex-shrink: 0; }

    /* ── Site Switcher ── */
    .site-switcher { position: relative; margin-right: 12px; flex-shrink: 0; }
    .site-switcher-toggle { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1px solid var(--dark-gray); border-radius: 6px; background: transparent; color: var(--mid-gray); font-family: inherit; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; transition: all 0.15s ease; }
    .site-switcher-toggle:hover { color: var(--white); border-color: var(--muted); }
    .site-switcher-chevron { transition: transform 0.2s ease; }
    .site-switcher.open .site-switcher-chevron { transform: rotate(180deg); }
    .site-switcher-dropdown { display: none; position: absolute; top: calc(100% + 8px); left: 0; min-width: 260px; background: var(--white); border: 1px solid var(--gray-e9); border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.06); z-index: 200; overflow: hidden; }
    .site-switcher.open .site-switcher-dropdown { display: block; }
    .site-switcher-option { display: block; padding: 12px 16px; text-decoration: none; transition: background 0.12s ease; }
    .site-switcher-option:hover { background: var(--light-gray); }
    .site-switcher-option.active { background: var(--irc-yellow-lightest); border-left: 3px solid var(--irc-yellow); }
    .site-switcher-option-name { display: block; font-size: 0.875rem; font-weight: 700; color: var(--black); line-height: 1.3; }
    .site-switcher-option-desc { display: block; font-size: 0.75rem; color: var(--muted); margin-top: 2px; line-height: 1.3; }

    /* ── Mobile header ── */
    .mobile-menu-btn { display: none; background: none; border: none; padding: 6px; cursor: pointer; margin-left: auto; }
    .mobile-menu-btn svg { width: 24px; height: 24px; color: var(--white); }
    .mobile-nav { display: none; }
    .mobile-nav.open { display: flex; flex-direction: column; gap: 4px; padding: 12px 24px 16px; background: var(--dark-gray); }
    .mobile-nav a { padding: 10px 14px; border-radius: 6px; font-size: 0.8125rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--mid-gray); text-decoration: none; transition: all 0.12s ease; }
    .mobile-nav a:hover { color: var(--white); background: rgba(255,255,255,0.05); }
    .mobile-nav a.active { color: var(--black); background: var(--irc-yellow); }
    .mobile-nav a.ask-albert-btn { display: flex; align-items: center; gap: 6px; color: var(--irc-yellow); background: transparent; border: 1.5px solid var(--irc-yellow); margin-top: 4px; }
    .mobile-nav a.ask-albert-btn:hover { background: var(--irc-yellow); color: var(--black); }
    .mobile-nav a.ask-albert-btn.active { background: var(--irc-yellow); color: var(--black); }

    @media (max-width: 768px) {
      .header-nav { display: none; }
      .mobile-menu-btn { display: block; }
    }

    /* ── Ask Albert Page ── */
    .albert-page {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 64px);
      overflow: hidden;
      background: var(--white);
    }

    .albert-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      padding: 0 24px;
      overflow-y: auto;
      min-height: 0;
    }

    .albert-welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      flex: 1;
      text-align: center;
      padding: 32px 20px 16px;
    }

    .albert-welcome.hidden { display: none; }

    .albert-avatar-large {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin-bottom: 16px;
      background: var(--light-gray);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      overflow: hidden;
    }

    .albert-avatar-large img { width: 100%; height: 100%; object-fit: cover; }

    .albert-welcome h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin: 0 0 8px 0;
      color: var(--black);
      font-family: 'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    .albert-welcome p {
      font-size: 0.9375rem;
      color: var(--muted);
      margin: 0 0 20px 0;
      max-width: 480px;
      line-height: 1.4;
      font-weight: 400;
    }

    .example-chips {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 16px;
      width: 100%;
      max-width: 640px;
    }

    .example-chip {
      padding: 10px 14px;
      border: 1px solid var(--gray-e9);
      border-radius: 6px;
      background: var(--white);
      color: var(--dark-gray);
      cursor: pointer;
      font-size: 0.8125rem;
      font-family: 'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 400;
      line-height: 1.3;
      text-align: left;
      transition: all 0.15s ease;
    }

    .example-chip:hover { background: var(--light-gray); border-color: #d9d9d9; }
    .example-chip:active { transform: scale(0.98); }

    .albert-chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .albert-chat.empty { display: none; }

    .message {
      display: flex;
      gap: 12px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { justify-content: flex-end; }
    .message.albert { justify-content: flex-start; }

    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--light-gray);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .message-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .message-bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      word-wrap: break-word;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }

    .message.user .message-bubble {
      background: var(--black);
      color: var(--white);
      border-radius: 12px;
    }

    .message.albert .message-bubble {
      background: var(--light-gray);
      color: var(--black);
      max-width: 85%;
      border-radius: 12px;
    }

    .markdown-content { color: var(--black); font-family: 'DM Sans', sans-serif; }
    .markdown-content h2, .markdown-content h3, .markdown-content h4 { margin: 16px 0 8px 0; font-weight: 600; }
    .markdown-content p { margin: 8px 0; }
    .markdown-content ul, .markdown-content ol { margin: 8px 0; padding-left: 24px; }
    .markdown-content li { margin: 4px 0; }
    .markdown-content strong { font-weight: 600; }
    .markdown-content code { background: var(--light-gray); padding: 2px 6px; border-radius: 4px; font-family: 'Monaco', monospace; font-size: 13px; }
    .markdown-content a { color: #2196F3; text-decoration: none; }
    .markdown-content a:hover { text-decoration: underline; }

    .loading-indicator { display: flex; gap: 6px; align-items: center; }

    .loading-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--dark-gray); animation: bounce 1.4s infinite;
    }
    .loading-dot:nth-child(1) { animation-delay: 0s; }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-8px); }
    }

    .albert-input-area {
      border-top: 1px solid var(--gray-e9);
      background: var(--white);
      padding: 12px 24px 16px;
      flex-shrink: 0;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      box-sizing: border-box;
    }

    .api-key-setup { display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px; }

    .api-key-input-wrapper { display: flex; gap: 8px; }

    .api-key-input {
      flex: 1; border: 1px solid var(--gray-e9); border-radius: 8px;
      padding: 10px 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--white);
    }
    .api-key-input::placeholder { color: var(--muted); }
    .api-key-input:focus { outline: none; border-color: var(--irc-yellow); box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.1); }

    .btn { padding: 10px 16px; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; }
    .btn-primary { background: var(--irc-yellow); color: var(--black); }
    .btn-primary:hover { background: #f4c700; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-secondary { background: var(--light-gray); color: var(--black); border: 1px solid var(--gray-e9); }
    .btn-secondary:hover { background: var(--gray-e9); }

    .api-key-help { font-size: 13px; color: var(--muted); line-height: 1.4; }
    .api-key-help a { color: var(--irc-yellow); text-decoration: none; }
    .api-key-help a:hover { text-decoration: underline; }

    .input-form { display: flex; gap: 8px; align-items: flex-end; max-width: 960px; margin: 0 auto; }
    .input-form-group { flex: 1; display: flex; flex-direction: column; }

    .input-textarea {
      border: 1.5px solid var(--gray-e9); border-radius: 8px; padding: 12px 14px;
      font-family: 'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 0.9375rem; font-weight: 400; resize: none;
      min-height: 48px; max-height: 160px; background: var(--white); color: var(--black);
      line-height: 1.4; overflow-y: auto; box-sizing: border-box; width: 100%;
    }
    .input-textarea::placeholder { color: var(--muted); }
    .input-textarea:focus { outline: none; border-color: var(--irc-yellow); box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.1); }

    .btn-send {
      padding: 12px 18px; min-width: 48px; height: 48px;
      background: var(--irc-yellow); color: var(--black); border: none; border-radius: 8px;
      font-weight: 700; font-size: 1.125rem; cursor: pointer;
      transition: background 0.15s ease; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; align-self: flex-end;
    }
    .btn-send:hover { background: #f4c700; }
    .btn-send:active { transform: scale(0.95); }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-settings {
      padding: 12px; background: var(--light-gray); border: 1.5px solid var(--gray-e9);
      border-radius: 8px; cursor: pointer; font-size: 16px; transition: background 0.15s ease;
      flex-shrink: 0; height: 48px; width: 48px; display: flex; align-items: center;
      justify-content: center; align-self: flex-end;
    }
    .btn-settings:hover { background: var(--gray-e9); }

    .settings-modal {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.5); z-index: 1000; align-items: center; justify-content: center;
    }
    .settings-modal.visible { display: flex; }
    .settings-modal-content { background: var(--white); border-radius: 12px; padding: 24px; max-width: 400px; width: 90%; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15); }
    .settings-modal h2 { margin: 0 0 16px 0; font-size: 20px; font-weight: 600; }
    .settings-form { display: flex; flex-direction: column; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 13px; font-weight: 500; color: var(--dark-gray); }
    .form-group input, .form-group select { border: 1px solid var(--gray-e9); border-radius: 8px; padding: 8px 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--white); color: var(--black); }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--irc-yellow); box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.1); }
    .modal-buttons { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

    .hidden { display: none; }

    .rag-status {
      font-size: 12px; color: var(--muted); text-align: center; padding: 4px 0;
    }
    .rag-status.loading { color: #2196F3; }
    .rag-status.error { color: var(--warning); }
    .rag-status.ready { color: #4CAF50; }

    .albert-chat::-webkit-scrollbar { width: 6px; }
    .albert-chat::-webkit-scrollbar-track { background: transparent; }
    .albert-chat::-webkit-scrollbar-thumb { background: var(--gray-e9); border-radius: 3px; }
    .albert-chat::-webkit-scrollbar-thumb:hover { background: #d9d9d9; }
  </style>
</head>
<body>
  <div id="header-mount"></div>

  <main class="albert-page">
    <div class="albert-container">
      <div id="albert-welcome" class="albert-welcome">
        <div class="albert-avatar-large">
          <img src="albert.png" alt="Albert avatar" onerror="this.parentElement.textContent='🤖'" />
        </div>
        <h1>Ask Albert</h1>
        <p id="welcome-text"></p>
        <div class="example-chips" id="example-chips"></div>
        <div id="rag-status" class="rag-status loading">Loading knowledge base...</div>
      </div>

      <div id="albert-chat" class="albert-chat empty"></div>
    </div>

    <div class="albert-input-area">
      <div id="api-key-setup" class="api-key-setup hidden">
        <div>
          <label for="api-key-input" style="font-size: 13px; font-weight: 500; color: var(--dark-gray); display: block; margin-bottom: 6px;">OpenRouter API Key</label>
          <div class="api-key-input-wrapper">
            <input type="password" id="api-key-input" class="api-key-input" placeholder="sk-or-v1-..." autocomplete="off">
            <button id="api-key-save-btn" class="btn btn-primary">Save</button>
          </div>
          <div class="api-key-help">
            Get your free API key at <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a>. No credit card required for free models.
          </div>
        </div>
      </div>

      <div id="chat-form" class="input-form hidden">
        <div class="input-form-group">
          <textarea id="message-input" class="input-textarea" placeholder="Ask about emergency response, CRF funding, classifications..." rows="1"></textarea>
        </div>
        <button id="settings-btn" class="btn-settings" aria-label="Settings">&#9881;</button>
        <button id="send-btn" class="btn-send" aria-label="Send">&rarr;</button>
      </div>
    </div>
  </main>

  <div id="settings-modal" class="settings-modal">
    <div class="settings-modal-content">
      <h2>Settings</h2>
      <div class="settings-form">
        <div class="form-group">
          <label for="api-key-field">API Key</label>
          <input type="password" id="api-key-field" placeholder="sk-or-v1-..." autocomplete="off">
        </div>
        <div class="form-group">
          <label for="model-field">Model</label>
          <select id="model-field">
            <option value="google/gemini-2.5-flash">Google Gemini 2.5 Flash</option>
            <option value="meta-llama/llama-3.1-70b-instruct">Llama 3.1 70B Instruct</option>
            <option value="meta-llama/llama-3.1-8b-instruct">Llama 3.1 8B Instruct</option>
          </select>
        </div>
      </div>
      <div style="border-top: 1px solid var(--gray-e9); margin-top: 16px; padding-top: 16px;">
        <button id="clear-chat-btn" class="btn btn-secondary" style="width: 100%; color: var(--muted);">Clear conversation</button>
      </div>
      <div class="modal-buttons">
        <button id="settings-cancel-btn" class="btn btn-secondary">Cancel</button>
        <button id="settings-save-btn" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="irc-shared.iife.js"></script>

  <script>
    // ============================================================================
    // SITE CONFIGURATION — Change this per-site copy
    // ============================================================================
    var SITE_CONFIG = {
      site: 'crf',
      headerPage: 'ask-albert',
      headerSite: 'crf',
      title: 'Ask Albert \u2014 CRF Calculator',
      welcome: 'I can help with CRF allocation guidelines, funding processes, emergency classification questions, and response tasks across all sectors.',
      examples: [
        'What is the CRF allocation ceiling for Red emergencies?',
        'What are the steps to request CRF funding?',
        'What needs to be in a CRF response plan?',
        'How does the 10% scale target work?'
      ]
    };

    // ============================================================================
    // NAVIGATOR RAG DATA URL
    // ============================================================================
    var NAVIGATOR_BASE = (function() {
      var h = window.location.hostname;
      if (h === 'bobkitchen.github.io') return '/emergency-response-navigator/';
      if (h === 'localhost' || h === '127.0.0.1') return '/emergency-response-navigator/';
      return 'https://bobkitchen.github.io/emergency-response-navigator/';
    })();

    // ============================================================================
    // STATE
    // ============================================================================
    var albertState = {
      apiKey: null,
      model: 'google/gemini-2.5-flash',
      messages: [],
      isStreaming: false,
      classifications: [],
      ragChunks: null,
      ragResources: null,
      ragReady: false
    };

    // ============================================================================
    // RAG ENGINE — Lightweight keyword search (no Orama dependency)
    // ============================================================================
    function loadRAGData() {
      var statusEl = document.getElementById('rag-status');

      var chunksPromise = fetch(NAVIGATOR_BASE + 'search-chunks.json')
        .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(function(data) { albertState.ragChunks = data; })
        .catch(function(e) { console.warn('Failed to load search-chunks.json:', e); });

      var resourcesPromise = fetch(NAVIGATOR_BASE + 'resource-index.json')
        .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(function(data) { albertState.ragResources = data; })
        .catch(function(e) { console.warn('Failed to load resource-index.json:', e); });

      Promise.all([chunksPromise, resourcesPromise]).then(function() {
        albertState.ragReady = !!(albertState.ragChunks || albertState.ragResources);
        if (statusEl) {
          if (albertState.ragChunks && albertState.ragResources) {
            statusEl.textContent = 'Knowledge base loaded (' + albertState.ragChunks.length + ' chunks, ' + albertState.ragResources.length + ' resources)';
            statusEl.className = 'rag-status ready';
          } else if (albertState.ragChunks || albertState.ragResources) {
            statusEl.textContent = 'Knowledge base partially loaded';
            statusEl.className = 'rag-status ready';
          } else {
            statusEl.textContent = 'Knowledge base unavailable \u2014 Albert will answer from built-in knowledge';
            statusEl.className = 'rag-status error';
          }
          setTimeout(function() { statusEl.style.display = 'none'; }, 5000);
        }
      });
    }

    function searchRAG(query, limit) {
      limit = limit || 8;
      if (!albertState.ragChunks) return [];

      var terms = query.toLowerCase().split(/\s+/).filter(function(t) { return t.length > 2; });
      if (terms.length === 0) return [];

      var scored = [];
      for (var i = 0; i < albertState.ragChunks.length; i++) {
        var chunk = albertState.ragChunks[i];
        var text = (chunk.title + ' ' + chunk.content).toLowerCase();
        var score = 0;
        for (var t = 0; t < terms.length; t++) {
          var idx = 0;
          while ((idx = text.indexOf(terms[t], idx)) !== -1) {
            score++;
            idx += terms[t].length;
          }
          // Title boost
          if (chunk.title && chunk.title.toLowerCase().indexOf(terms[t]) !== -1) {
            score += 3;
          }
        }
        if (score > 0) {
          scored.push({ chunk: chunk, score: score });
        }
      }

      scored.sort(function(a, b) { return b.score - a.score; });
      return scored.slice(0, limit).map(function(s) { return s.chunk; });
    }

    function searchResources(query, limit) {
      limit = limit || 8;
      if (!albertState.ragResources) return [];

      var terms = query.toLowerCase().split(/\s+/).filter(function(t) { return t.length > 2; });
      if (terms.length === 0) return [];

      var scored = [];
      for (var i = 0; i < albertState.ragResources.length; i++) {
        var res = albertState.ragResources[i];
        var text = ((res.name || '') + ' ' + (res.sector || '') + ' ' + (res.task || '')).toLowerCase();
        var score = 0;
        for (var t = 0; t < terms.length; t++) {
          if (text.indexOf(terms[t]) !== -1) score++;
        }
        if (score > 0) scored.push({ resource: res, score: score });
      }

      scored.sort(function(a, b) { return b.score - a.score; });
      return scored.slice(0, limit).map(function(s) { return s.resource; });
    }

    // ============================================================================
    // CLASSIFICATION DATA
    // ============================================================================
    function loadClassificationsData() {
      if (window.IRCShared && window.IRCShared.fetchClassifications) {
        IRCShared.fetchClassifications().then(function(data) {
          if (data && data.length > 0) albertState.classifications = data;
        }).catch(function() {});
      }
    }

    function buildClassificationSummary() {
      var cls = albertState.classifications;
      if (!cls || cls.length === 0) return '';

      var stances = {};
      var total = cls.length;
      for (var i = 0; i < total; i++) {
        var s = (cls[i].stance || 'unknown').toLowerCase();
        stances[s] = (stances[s] || 0) + 1;
      }

      var parts = ['LIVE CLASSIFICATION DATA (' + total + ' records):'];
      var keys = Object.keys(stances).sort(function(a, b) { return stances[b] - stances[a]; });
      for (var k = 0; k < keys.length; k++) {
        parts.push('- ' + keys[k] + ': ' + stances[keys[k]]);
      }
      return parts.join('\n');
    }

    // ============================================================================
    // SYSTEM PROMPT
    // ============================================================================
    function buildSystemPrompt(userQuery) {
      var ragContext = '';
      if (albertState.ragReady && userQuery) {
        var chunks = searchRAG(userQuery, 8);
        if (chunks.length > 0) {
          ragContext += '\n\n## Relevant Tasks & Guidelines (from IRC Emergency Management Guidelines)\n';
          for (var i = 0; i < chunks.length; i++) {
            var c = chunks[i];
            ragContext += '\n### ' + (c.title || c.id) + ' [' + (c.type || '') + ']\n' + c.content + '\n';
          }
        }

        var resources = searchResources(userQuery, 8);
        if (resources.length > 0) {
          ragContext += '\n\n## Relevant Resources & Templates\n';
          for (var r = 0; r < resources.length; r++) {
            var res = resources[r];
            ragContext += '- **' + res.name + '** (' + (res.sector || '') + ') \u2014 ' + (res.task || '') + (res.url ? ' [Link](' + res.url + ')' : '') + '\n';
          }
        }
      }

      var classificationContext = buildClassificationSummary();

      var focusPriority = '';
      if (SITE_CONFIG.site === 'crf') {
        focusPriority = [
          '## Your Focus Priority',
          'You are embedded in the CRF Allocation Calculator. Prioritize questions about:',
          '- CRF allocation ceilings ($1M Orange, $2M Red), the $47.34 per-client cost',
          '- CRF request process, response plan requirements (Sections A-G)',
          '- 14-day deadline for logframe + budget submission',
          '- 10% scale target, affected population, and allocation methodology',
          '- Early Action funding ($100K per region earmarked in CRF)',
          'For detailed classification data charts or trends, suggest the Classification app\'s Ask Albert.'
        ].join('\n');
      } else if (SITE_CONFIG.site === 'classification') {
        focusPriority = [
          '## Your Focus Priority',
          'You are embedded in the Emergency Classification System. Prioritize questions about:',
          '- Classification data, severity ratings, stance lookups',
          '- Trends across countries, regions, crisis types',
          '- Reclassification rules and expiration',
          '- Complex emergency escalation rules (3 Yellows \u2192 Orange, 2 Oranges \u2192 Red)',
          'For CRF allocation details, suggest the CRF Calculator\'s Ask Albert.'
        ].join('\n');
      }

      return 'You are Albert, the IRC Emergency Response AI Assistant. You have deep knowledge of IRC\'s Emergency Management Guidelines, the Classification System, CRF funding processes, and the complete emergency response lifecycle.\n\n' +

      'CORE KNOWLEDGE:\n' +
      '- Classification stances: White (Outside Mission Scope), Yellow (Monitor & Prepare), Orange (Mobilize), Red (Maximum Response)\n' +
      '- Severity scale: 0-10. Each classification open 6 weeks (42 days)\n' +
      '- Complex emergency rules: 3 Yellows \u2192 Orange, 2 Oranges \u2192 Red\n' +
      '- Response Imperative: respond to all Orange and Red classifications, 10% scale target\n' +
      '- 7 Response Phases: R1 Emergency Onset, R2 Context Analysis, R3 Strategy Development, R4 Response Planning, R5 Implementation, R6 Learnings, R7 Transition & Handover\n' +
      '- 13 Functional Sectors: Response Management, Finance, People & Culture, Supply Chain, Safety & Security, Safeguarding, Technical Programs, MEAL, Grants, Partnerships, Integra Launch\n' +
      '- Emergency Unit Services: classification, escalation, deployment, surge support\n' +
      '- CRF (Crisis Response Fund): $1M ceiling for Orange, $2M for Red emergencies, $47.34 per-client cost, 14-day deadline for logframe + budget, 10% scale target, Early Action $100K/region\n' +
      '- CRF Response Plan sections: A (Crisis Context), B (IRC Context), C (Response Strategy), D (10% Scale Target), E (Staffing), F (Partnerships), G (Budget)\n\n' +

      focusPriority + '\n\n' +

      '## Guidelines\n' +
      '- Be direct and actionable. Use markdown formatting.\n' +
      '- When referencing specific tasks, cite the task ID (e.g., RMIE-001) and sector.\n' +
      '- When referencing resources, include links if available.\n' +
      '- If the user asks about topics outside your focus, still answer helpfully but suggest the more relevant app.\n' +
      '- Keep responses concise but thorough. Use bullet points and headers for clarity.\n' +

      (ragContext ? '\n\n## CONTEXT FROM IRC KNOWLEDGE BASE\nUse the following retrieved context to inform your answers. Cite specific tasks and resources when relevant.' + ragContext : '') +

      (classificationContext ? '\n\n' + classificationContext : '');
    }

    // ============================================================================
    // CHAT PERSISTENCE
    // ============================================================================
    function saveChatHistory() {
      var saveable = albertState.messages.map(function(m) {
        return { id: m.id, role: m.role, content: m.content };
      });
      try {
        localStorage.setItem('irc_albert_chat_' + SITE_CONFIG.site, JSON.stringify(saveable));
      } catch (e) {}
    }

    function restoreChatHistory() {
      try {
        var saved = localStorage.getItem('irc_albert_chat_' + SITE_CONFIG.site);
        if (!saved) return false;
        var messages = JSON.parse(saved);
        if (!messages || messages.length === 0) return false;

        document.getElementById('albert-welcome').classList.add('hidden');
        var chat = document.getElementById('albert-chat');
        chat.classList.remove('empty');

        for (var i = 0; i < messages.length; i++) {
          var msg = messages[i];
          albertState.messages.push(msg);
          renderMessage(msg.id, msg.role === 'albert' ? 'albert' : 'user', msg.content);
        }

        scrollChatToBottom();
        return true;
      } catch (e) { return false; }
    }

    // ============================================================================
    // INITIALIZATION
    // ============================================================================
    function init() {
      // Render header
      if (window.IRCShared && window.IRCShared.renderHeader) {
        document.getElementById('header-mount').innerHTML = IRCShared.renderHeader(SITE_CONFIG.headerPage, SITE_CONFIG.headerSite);
        if (IRCShared.initSiteSwitcher) IRCShared.initSiteSwitcher();
      }

      // Set title and welcome text
      document.title = SITE_CONFIG.title;
      document.getElementById('welcome-text').textContent = SITE_CONFIG.welcome;

      // Load API key
      var savedKey = localStorage.getItem('irc_openrouter_api_key') || localStorage.getItem('irc_openrouter_key');
      if (savedKey) {
        albertState.apiKey = savedKey;
        // Normalize to unified key
        localStorage.setItem('irc_openrouter_api_key', savedKey);
        showChatInterface();
      } else {
        showApiKeySetup();
      }

      // Load model preference
      var savedModel = localStorage.getItem('irc_albert_model');
      if (savedModel) albertState.model = savedModel;

      setupEventListeners();
      populateExampleChips();
      loadRAGData();
      loadClassificationsData();

      // Restore previous chat
      if (savedKey) restoreChatHistory();
    }

    function showApiKeySetup() {
      document.getElementById('api-key-setup').classList.remove('hidden');
      document.getElementById('chat-form').classList.add('hidden');

      var saveBtn = document.getElementById('api-key-save-btn');
      var keyInput = document.getElementById('api-key-input');

      saveBtn.addEventListener('click', function() {
        var key = keyInput.value.trim();
        if (!key) { alert('Please enter your OpenRouter API key'); return; }
        albertState.apiKey = key;
        localStorage.setItem('irc_openrouter_api_key', key);
        showChatInterface();
      });

      keyInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') saveBtn.click();
      });
    }

    function showChatInterface() {
      document.getElementById('api-key-setup').classList.add('hidden');
      document.getElementById('chat-form').classList.remove('hidden');

      var messageInput = document.getElementById('message-input');
      messageInput.focus();

      document.getElementById('send-btn').addEventListener('click', sendMessage);
      messageInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      });
      messageInput.addEventListener('input', autoResizeTextarea);
      document.getElementById('settings-btn').addEventListener('click', openSettings);
    }

    function setupEventListeners() {
      var modal = document.getElementById('settings-modal');
      document.getElementById('settings-cancel-btn').addEventListener('click', function() { modal.classList.remove('visible'); });

      document.getElementById('settings-save-btn').addEventListener('click', function() {
        var newKey = document.getElementById('api-key-field').value.trim();
        var newModel = document.getElementById('model-field').value;
        if (newKey) {
          albertState.apiKey = newKey;
          localStorage.setItem('irc_openrouter_api_key', newKey);
        }
        if (newModel) {
          albertState.model = newModel;
          localStorage.setItem('irc_albert_model', newModel);
        }
        modal.classList.remove('visible');
      });

      modal.addEventListener('click', function(e) { if (e.target === modal) modal.classList.remove('visible'); });

      document.getElementById('clear-chat-btn').addEventListener('click', function() {
        albertState.messages = [];
        localStorage.removeItem('irc_albert_chat_' + SITE_CONFIG.site);
        document.getElementById('albert-chat').innerHTML = '';
        document.getElementById('albert-chat').classList.add('empty');
        document.getElementById('albert-welcome').classList.remove('hidden');
        modal.classList.remove('visible');
      });
    }

    function openSettings() {
      document.getElementById('api-key-field').value = albertState.apiKey || '';
      document.getElementById('model-field').value = albertState.model;
      document.getElementById('settings-modal').classList.add('visible');
    }

    function autoResizeTextarea() {
      var textarea = document.getElementById('message-input');
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 160) + 'px';
    }

    function populateExampleChips() {
      var container = document.getElementById('example-chips');
      container.innerHTML = SITE_CONFIG.examples.map(function(text) {
        return '<button class="example-chip" data-text="' + escapeHtml(text) + '">' + text + '</button>';
      }).join('');

      container.querySelectorAll('.example-chip').forEach(function(chip) {
        chip.addEventListener('click', function() {
          var input = document.getElementById('message-input');
          input.value = chip.getAttribute('data-text');
          input.focus();
          autoResizeTextarea();
        });
      });
    }

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ============================================================================
    // MESSAGE HANDLING
    // ============================================================================
    function sendMessage() {
      var input = document.getElementById('message-input');
      var message = input.value.trim();
      if (!message || albertState.isStreaming) return;

      document.getElementById('albert-welcome').classList.add('hidden');
      document.getElementById('albert-chat').classList.remove('empty');

      var userMsgId = 'msg-' + Date.now() + '-user';
      albertState.messages.push({ id: userMsgId, role: 'user', content: message });
      renderMessage(userMsgId, 'user', message);

      input.value = '';
      input.style.height = 'auto';
      scrollChatToBottom();

      albertState.isStreaming = true;
      getAlbertResponse(message);
    }

    function renderMessage(msgId, role, content) {
      var chat = document.getElementById('albert-chat');
      var messageEl = document.createElement('div');
      messageEl.className = 'message ' + role;
      messageEl.id = 'message-' + msgId;

      if (role === 'user') {
        messageEl.innerHTML = '<div class="message-bubble">' + escapeHtml(content) + '</div>';
      } else {
        var htmlContent = marked.parse(content);
        messageEl.innerHTML =
          '<div class="message-avatar"><img src="albert.png" alt="Albert" onerror="this.parentElement.textContent=\'&#129302;\'" /></div>' +
          '<div><div class="message-bubble"><div class="markdown-content">' + htmlContent + '</div></div></div>';
      }

      chat.appendChild(messageEl);
    }

    function scrollChatToBottom() {
      var chat = document.getElementById('albert-chat');
      setTimeout(function() { chat.scrollTop = chat.scrollHeight; }, 0);
    }

    // ============================================================================
    // STREAMING API CALL
    // ============================================================================
    async function getAlbertResponse(userMessage) {
      var loadingMsgId = 'msg-' + Date.now() + '-loading';
      var chat = document.getElementById('albert-chat');
      var loadingEl = document.createElement('div');
      loadingEl.className = 'message albert';
      loadingEl.id = 'message-' + loadingMsgId;
      loadingEl.innerHTML =
        '<div class="message-avatar"><img src="albert.png" alt="Albert" onerror="this.parentElement.textContent=\'&#129302;\'" /></div>' +
        '<div class="message-bubble"><div class="loading-indicator">' +
        '<div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>' +
        '</div></div>';
      chat.appendChild(loadingEl);
      scrollChatToBottom();

      try {
        var systemPrompt = buildSystemPrompt(userMessage);

        var conversationMessages = albertState.messages.map(function(msg) {
          return { role: msg.role === 'albert' ? 'assistant' : msg.role, content: msg.content };
        });

        var payload = {
          model: albertState.model,
          messages: [
            { role: 'system', content: systemPrompt }
          ].concat(conversationMessages).concat([
            { role: 'user', content: userMessage }
          ]),
          temperature: 0.3,
          max_tokens: 2000,
          stream: true
        };

        var response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + albertState.apiKey,
            'HTTP-Referer': window.location.href,
            'X-Title': SITE_CONFIG.title
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          var errData = await response.json();
          throw new Error(errData.error?.message || 'API request failed (' + response.status + ')');
        }

        // Remove loading indicator and create response message
        loadingEl.remove();

        var albertMsgId = 'msg-' + Date.now() + '-albert';
        var messageEl = document.createElement('div');
        messageEl.className = 'message albert';
        messageEl.id = 'message-' + albertMsgId;
        messageEl.innerHTML =
          '<div class="message-avatar"><img src="albert.png" alt="Albert" onerror="this.parentElement.textContent=\'&#129302;\'" /></div>' +
          '<div><div class="message-bubble"><div class="markdown-content" id="stream-content-' + albertMsgId + '"></div></div></div>';
        chat.appendChild(messageEl);

        var fullContent = '';
        var contentEl = document.getElementById('stream-content-' + albertMsgId);

        var reader = response.body.getReader();
        var decoder = new TextDecoder();
        var buffer = '';

        while (true) {
          var result = await reader.read();
          if (result.done) break;

          buffer += decoder.decode(result.value, { stream: true });
          var lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line.startsWith('data: ')) continue;
            var data = line.substring(6);
            if (data === '[DONE]') break;

            try {
              var parsed = JSON.parse(data);
              var delta = parsed.choices && parsed.choices[0] && parsed.choices[0].delta;
              if (delta && delta.content) {
                fullContent += delta.content;
                contentEl.innerHTML = marked.parse(fullContent);
                scrollChatToBottom();
              }
            } catch (e) {}
          }
        }

        albertState.messages.push({ id: albertMsgId, role: 'albert', content: fullContent });
        saveChatHistory();
        scrollChatToBottom();

      } catch (error) {
        loadingEl.remove();
        var errorMsgId = 'msg-' + Date.now() + '-error';
        var errorMsg = 'Sorry, I encountered an error: ' + error.message;
        albertState.messages.push({ id: errorMsgId, role: 'albert', content: errorMsg });
        renderMessage(errorMsgId, 'albert', errorMsg);
        scrollChatToBottom();
      } finally {
        albertState.isStreaming = false;
      }
    }

    // ============================================================================
    // STARTUP
    // ============================================================================
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
